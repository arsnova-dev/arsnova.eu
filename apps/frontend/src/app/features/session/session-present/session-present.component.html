<section class="session-present l-stack l-stack--sm">
  <mat-card appearance="outlined" class="session-placeholder">
    <mat-card-content>
      <p class="session-placeholder__text">{{ presenterInfo() }}</p>
      @if (currentQuestionLabel()) {
        <p class="session-placeholder__question">{{ currentQuestionLabel() }}</p>
      }
    </mat-card-content>
  </mat-card>

  <app-word-cloud [responses]="freetextResponses()" />
</section>
